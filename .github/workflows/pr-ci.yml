name: PR validation

# Runs on every pull request and on pushes to main. Designed to run
# fully on GitHub-hosted runners (no local-machine dependency) and to
# work the same way inside a GitHub Codespace via the .devcontainer.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cross-platform unit tests + Core build. Runs on Linux for speed.
  # WPF/WebView2 cannot run on Linux, so the Noteaerator/ project is
  # intentionally NOT built here -- see windows-build job below.
  test:
    name: test (linux, Noteaerator.Core + Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: |
          dotnet restore POC/Noteaerator.Core/Noteaerator.Core.csproj
          dotnet restore POC/Noteaerator.Tests/Noteaerator.Tests.csproj
      - name: Build (Release, warnings as errors)
        run: |
          dotnet build POC/Noteaerator.Core/Noteaerator.Core.csproj   -c Release --no-restore -warnaserror
          dotnet build POC/Noteaerator.Tests/Noteaerator.Tests.csproj -c Release --no-restore -warnaserror
      - name: Test
        run: dotnet test POC/Noteaerator.Tests/Noteaerator.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
          retention-days: 14

  # Verify the WPF host project still compiles for both target architectures.
  # Requires Windows runners.
  windows-build:
    name: windows-build (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build Noteaerator (Release, ${{ matrix.rid }})
        shell: pwsh
        run: |
          dotnet build POC/Noteaerator/Noteaerator.csproj `
            -c Release -r ${{ matrix.rid }} `
            --nologo
