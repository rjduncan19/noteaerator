<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <title>09 Robot Reader — friendly bot holding a note</title>
  <rect width="256" height="256" rx="48" fill="#e0f2fe"/>
  <g transform="translate(56,40)">
    <!-- head -->
    <rect x="20" y="0" width="100" height="80" rx="14" fill="#475569" stroke="#0f172a" stroke-width="4"/>
    <circle cx="50" cy="38" r="10" fill="#fde047"/>
    <circle cx="90" cy="38" r="10" fill="#fde047"/>
    <line x1="70" y1="-14" x2="70" y2="0" stroke="#0f172a" stroke-width="4"/>
    <circle cx="70" cy="-18" r="6" fill="#22d3ee" stroke="#0f172a" stroke-width="3"/>
    <!-- body holding note -->
    <rect x="0" y="90" width="140" height="100" rx="10" fill="#94a3b8" stroke="#0f172a" stroke-width="4"/>
    <rect x="30" y="105" width="80" height="70" rx="4" fill="#fefce8" stroke="#0f172a" stroke-width="3"/>
    <line x1="40" y1="120" x2="100" y2="120" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="135" x2="100" y2="135" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="150" x2="80"  y2="150" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
