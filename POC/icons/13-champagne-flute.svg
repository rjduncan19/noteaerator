<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <title>13 Champagne Flute — slim flute with rising bubble column</title>
  <rect width="256" height="256" rx="48" fill="#fffbeb"/>
  <g transform="translate(108,30)" stroke="#0f172a" stroke-width="5" stroke-linejoin="round" fill="none">
    <!-- flute -->
    <path d="M0 0 L40 0 L36 110 Q20 130 4 110 Z" fill="#fde68a"/>
    <!-- liquid level -->
    <path d="M3 30 L37 30 L36 110 Q20 130 4 110 Z" fill="#fbbf24" stroke="none"/>
    <!-- stem -->
    <line x1="20" y1="125" x2="20" y2="180"/>
    <line x1="0"  y1="180" x2="40" y2="180"/>
  </g>
  <g fill="#fef3c7" stroke="#0f172a" stroke-width="2.5">
    <circle cx="124" cy="120" r="4"/>
    <circle cx="130" cy="100" r="5"/>
    <circle cx="120" cy="80"  r="4"/>
    <circle cx="128" cy="60"  r="6"/>
    <circle cx="120" cy="40"  r="4"/>
    <circle cx="132" cy="22"  r="3"/>
  </g>
</svg>
